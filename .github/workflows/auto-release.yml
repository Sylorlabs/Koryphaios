name: Auto Release on /update

on:
  push:
    branches:
      - master

jobs:
  check-update-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.bump.outputs.new_version }}
      release_body: ${{ steps.changelog.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for /update in commit message
        id: check
        # Pass the message via env — inlining ${{ }} into the script executes
        # backticks/$() from commit messages as shell commands (broke on `agy`).
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -q "/update"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        if: steps.check.outputs.should_release == 'true'
        run: |
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          jq ".version = \"$NEW_VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          # Update Cargo.toml — find whatever version is currently there and replace it
          CARGO_CURRENT=$(grep -m1 '^version = ' desktop/src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          sed -i "s/^version = \"$CARGO_CURRENT\"/version = \"$NEW_VERSION\"/" desktop/src-tauri/Cargo.toml
          jq ".version = \"$NEW_VERSION\"" desktop/src-tauri/tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp desktop/src-tauri/tauri.conf.json

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get last release tag
          LAST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+$LAST_TAG..HEAD}"
          [ -z "$RANGE" ] && RANGE="HEAD~30..HEAD"

          node -e "
          const { execSync } = require('child_process');
          const { writeFileSync } = require('fs');

          const raw = execSync('git log $RANGE --pretty=format:\"%s\" --no-merges 2>/dev/null || echo \"\"').toString();
          const commits = raw.split('\n').filter(Boolean);

          const features = [], fixes = [], improvements = [];
          const changesJson = [];

          for (const c of commits) {
            if (/^\[GHOST\]|^chore:|^\[skip ci\]/i.test(c)) continue;
            if (/^feat(\(.*?\))?:/i.test(c)) {
              const d = c.replace(/^feat(\(.*?\))?:\s*/i, '');
              features.push(d);
              changesJson.push({ type: 'feature', description: d });
            } else if (/^fix(\(.*?\))?:/i.test(c)) {
              const d = c.replace(/^fix(\(.*?\))?:\s*/i, '');
              fixes.push(d);
              changesJson.push({ type: 'fix', description: d });
            } else if (/^perf|^refactor|^improve/i.test(c)) {
              const d = c.replace(/^(perf|refactor|improve)(\(.*?\))?:\s*/i, '');
              improvements.push(d);
              changesJson.push({ type: 'improvement', description: d });
            } else {
              improvements.push(c);
              changesJson.push({ type: 'improvement', description: c });
            }
          }

          if (!changesJson.length) {
            improvements.push('Minor updates and stability improvements');
            changesJson.push({ type: 'improvement', description: 'Minor updates and stability improvements' });
          }

          let md = '';
          if (features.length) md += '### ✨ Features\n' + features.map(f => '- ' + f).join('\n') + '\n\n';
          if (fixes.length)    md += '### 🐛 Bug Fixes\n' + fixes.map(f => '- ' + f).join('\n') + '\n\n';
          if (improvements.length) md += '### 🚀 Improvements\n' + improvements.map(i => '- ' + i).join('\n') + '\n\n';

          md += '---\n\n';
          md += '**macOS** · **Windows** · **Linux** — download below or update automatically on next launch.\n\n';
          md += '<!-- CHANGES_JSON\n' + JSON.stringify(changesJson) + '\n-->';

          writeFileSync('release-notes.md', md);
          console.log('Changelog generated with', changesJson.length, 'entries');
          "

          # Output as multiline (GitHub requires delimiter not in content)
          DELIMITER="KORY_RELEASE_$(head -c 8 /dev/urandom | xxd -p)"
          {
            echo "release_body<<${DELIMITER}"
            cat release-notes.md
            echo ""
            echo "${DELIMITER}"
          } >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  build-and-release:
    needs: check-update-trigger
    if: needs.check-update-trigger.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialize: each job fully builds + merges its platform into the shared
      # latest.json before the next starts, so parallel uploads never collide
      # ("latest.json already exists").
      max-parallel: 1
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles app'
            bun-target: 'bun-darwin-arm64'
            sidecar-suffix: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin --bundles app'
            bun-target: 'bun-darwin-x64'
            sidecar-suffix: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: '--bundles deb,appimage'
            bun-target: 'bun-linux-x64'
            sidecar-suffix: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: '--bundles msi,nsis'
            bun-target: 'bun-windows-x64'
            sidecar-suffix: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev

      - name: Install workspace dependencies
        run: bun install

      - name: Build backend sidecar
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.sidecar-suffix }}" == *"windows"* ]]; then EXT=".exe"; fi
          OUTFILE="$(pwd)/desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.sidecar-suffix }}${EXT}"
          bun build --compile \
            --target=${{ matrix.bun-target }} \
            backend/src/server.ts \
            --outfile="$OUTFILE"
          cp "$OUTFILE" "desktop/src-tauri/sidecar/koryphaios-backend${EXT}" 2>/dev/null || true

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Inject signing public key
        shell: bash
        run: |
          jq --arg key "$TAURI_SIGNING_PUBLIC_KEY" \
            '.plugins.updater.pubkey = $key' \
            desktop/src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp desktop/src-tauri/tauri.conf.json
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Prepare Linux AppImage tooling
        if: contains(matrix.platform, 'ubuntu')
        run: |
          # Ship a current linuxdeploy (the pinned 2024 build aborts on bun
          # sidecars) and shim ldd so an empty-output failure on the
          # self-contained bun binary reads as "no dependencies".
          mkdir -p ~/.cache/tauri
          curl -sL -o ~/.cache/tauri/linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x ~/.cache/tauri/linuxdeploy-x86_64.AppImage
          mkdir -p "$HOME/build-shims"
          printf '#!/bin/bash\nout=$(/usr/bin/ldd "$@" 2>&1); status=$?; echo "$out"\nif [ $status -ne 0 ] && [ -z "$out" ]; then exit 0; fi\nexit $status\n' > "$HOME/build-shims/ldd"
          chmod +x "$HOME/build-shims/ldd"
          echo "$HOME/build-shims" >> $GITHUB_PATH
          echo "NO_STRIP=true" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        with:
          projectPath: ./desktop
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tagName: v${{ needs.check-update-trigger.outputs.new_version }}
          releaseName: "Koryphaios v${{ needs.check-update-trigger.outputs.new_version }}"
          releaseBody: ${{ needs.check-update-trigger.outputs.release_body }}
          releaseDraft: false
          prerelease: false

      - name: Repair AppImage sidecar and re-sign
        if: contains(matrix.platform, 'ubuntu')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # linuxdeploy's bundled patchelf corrupts bun-compiled binaries
          # (blob offset breaks) — swap the pristine sidecar back in, then
          # re-sign the artifact and fix latest.json so the updater verifies.
          APP=$(ls desktop/src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          [ -n "$APP" ] || { echo "no AppImage built"; exit 1; }
          ./desktop/scripts/fix-appimage-sidecar.sh "$APP" desktop/src-tauri/sidecar/koryphaios-backend-x86_64-unknown-linux-gnu
          cd desktop && bunx tauri signer sign "../$APP" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" && cd ..
          TAG="v${{ needs.check-update-trigger.outputs.new_version }}"
          gh release upload "$TAG" "$APP" "$APP.sig" --clobber
          gh release download "$TAG" -p latest.json -O latest.json
          SIG=$(cat "$APP.sig")
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$(basename "$APP")"
          jq --arg sig "$SIG" --arg url "$URL" \
            '.platforms."linux-x86_64" = { signature: $sig, url: $url }' \
            latest.json > latest.json.tmp && mv latest.json.tmp latest.json
          gh release upload "$TAG" latest.json --clobber

  build-macos-universal:
    needs: [check-update-trigger, build-and-release]
    if: needs.check-update-trigger.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Install workspace dependencies
        run: bun install

      - name: Build backend sidecar (both macOS targets for universal)
        run: |
          bun build --compile --target=bun-darwin-arm64 backend/src/server.ts \
            --outfile=desktop/src-tauri/sidecar/koryphaios-backend-aarch64-apple-darwin
          bun build --compile --target=bun-darwin-x64 backend/src/server.ts \
            --outfile=desktop/src-tauri/sidecar/koryphaios-backend-x86_64-apple-darwin

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Inject signing public key
        shell: bash
        run: |
          jq --arg key "$TAURI_SIGNING_PUBLIC_KEY" \
            '.plugins.updater.pubkey = $key' \
            desktop/src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp desktop/src-tauri/tauri.conf.json
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build Universal Binary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        with:
          projectPath: ./desktop
          args: '--target universal-apple-darwin'
          includeUpdaterJson: false
          tagName: v${{ needs.check-update-trigger.outputs.new_version }}
          releaseName: "Koryphaios v${{ needs.check-update-trigger.outputs.new_version }}"
          releaseBody: "macOS Universal binary (Apple Silicon + Intel)."
          releaseDraft: false
          prerelease: false

  notify-website:
    needs: [check-update-trigger, build-and-release, build-macos-universal]
    if: needs.check-update-trigger.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Koryphaios.com rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/Sylorlabs/Koryphaios.com/dispatches" \
            -d '{"event_type":"new_release","client_payload":{"version":"${{ needs.check-update-trigger.outputs.new_version }}"}}'
          echo "Website rebuild triggered for v${{ needs.check-update-trigger.outputs.new_version }}"
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
