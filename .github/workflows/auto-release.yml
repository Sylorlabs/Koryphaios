name: Auto Release on /update

on:
  push:
    branches:
      - main

jobs:
  check-update-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for /update in commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          if echo "$COMMIT_MSG" | grep -q "/update"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "🚀 /update trigger detected - will create release"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No /update trigger found - skipping release"
          fi

      - name: Bump version
        id: bump
        if: steps.check.outputs.should_release == 'true'
        run: |
          # Get current version from package.json
          CURRENT=$(jq -r .version package.json)
          echo "Current version: $CURRENT"
          
          # Bump patch version (0.2.0 -> 0.2.1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update package.json
          jq ".version = \"$NEW_VERSION\"" package.json > package.json.tmp
          mv package.json.tmp package.json
          
          # Update Cargo.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" desktop/src-tauri/Cargo.toml
          
          # Update tauri.conf.json
          jq ".version = \"$NEW_VERSION\"" desktop/src-tauri/tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp desktop/src-tauri/tauri.conf.json

      - name: Commit version bump
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  build-and-release:
    needs: check-update-trigger
    if: needs.check-update-trigger.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./desktop
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          tagName: v${{ needs.check-update-trigger.outputs.new_version }}
          releaseName: "Koryphaios v${{ needs.check-update-trigger.outputs.new_version }}"
          releaseBody: |
            🚀 Auto-released via "/update" commit trigger
            
            **Changes:**
            ${{ github.event.head_commit.message }}
            
            ---
            
            ### Installation
            
            **macOS:** Download the `.dmg` file
            **Windows:** Download the `.msi` or `.exe` installer
            **Linux:** Download `.deb`, `.rpm`, or `.AppImage`
            
            The app will automatically check for updates on launch.
          releaseDraft: false
          prerelease: false

  build-macos-universal:
    needs: [check-update-trigger, build-and-release]
    if: needs.check-update-trigger.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build Universal Binary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./desktop
          args: '--target universal-apple-darwin'
          includeUpdaterJson: false
          tagName: v${{ needs.check-update-trigger.outputs.new_version }}
          releaseName: "Koryphaios v${{ needs.check-update-trigger.outputs.new_version }}"
          releaseBody: |
            🚀 Auto-released via "/update" commit trigger
            
            This is the macOS Universal build (works on both Intel and Apple Silicon).
          releaseDraft: false
          prerelease: false
