name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for exposed secrets
        run: |
          echo "🔍 Scanning for exposed API keys in committed files..."
          # Patterns: sk- keys, key- tokens, Bearer tokens, generic api keys
          VIOLATIONS=$(grep -rn --include='*.json' --include='*.ts' --include='*.js' --include='*.yml' --include='*.yaml' \
            -E '(sk-[a-zA-Z0-9]{20,}|key-[a-zA-Z0-9]{20,}|Bearer [a-zA-Z0-9_-]{20,}|"apiKey"\s*:\s*"[a-zA-Z0-9_-]{20,}")' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=target --exclude='.env.example' . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ EXPOSED SECRETS DETECTED:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No exposed secrets found."

      - name: Type check
        run: bun run typecheck

      - name: Lint (format check)
        run: bun run format:check

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build
