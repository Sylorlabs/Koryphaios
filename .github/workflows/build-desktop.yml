name: Build Desktop Apps

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'desktop/**'
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  # Build for Windows
  build-windows:
    runs-on: blacksmith-2vcpu-windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          TARGET="x86_64-pc-windows-msvc"
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${TARGET}.exe"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=bun-windows-x64 backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend.exe"

      - name: Build Tauri app
        working-directory: ./desktop
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build for macOS (Intel and Apple Silicon)
  build-macos:
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
            bun-target: bun-darwin-x64
          - arch: aarch64
            target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.target }}"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=${{ matrix.bun-target }} backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend"

      - name: Build Tauri app (Universal Binary)
        working-directory: ./desktop
        run: |
          bun run tauri build --target ${{ matrix.target }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build for Linux
  build-linux:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            bun-target: bun-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.target }}"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=${{ matrix.bun-target }} backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend"

      - name: Build Tauri app
        working-directory: ./desktop
        run: bun run tauri build --target ${{ matrix.target }}
        continue-on-error: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Repair AppImage sidecar (linuxdeploy corrupts bun-compiled binaries)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          # linuxdeploy runs patchelf over every ELF in the AppDir, which
          # corrupts bun --compile binaries (their JS blob offset shifts).
          # Tauri's linuxdeploy step may fail outright (newer alphas abort
          # when ldd exits non-zero on the corrupted sidecar) or succeed
          # but produce a broken AppImage. Either way, we rebuild the
          # AppImage from the populated AppDir with the pristine sidecar.
          set +e
          APPDIR="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Koryphaios.AppDir"
          PRISTINE="desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.target }}"
          APPIMAGE=$(ls "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/"*.AppImage 2>/dev/null | head -1)

          if [ ! -d "$APPDIR/usr/bin" ]; then
            echo "AppDir not found — linuxdeploy failed before creating it"
            exit 1
          fi

          # Replace the corrupted sidecar with the pristine one
          cp -f "$PRISTINE" "$APPDIR/usr/bin/koryphaios-backend"
          chmod +x "$APPDIR/usr/bin/koryphaios-backend"

          # Add root-level icon symlink (appimagetool requires Icon= to resolve)
          if [ -f "$APPDIR/Koryphaios.png" ]; then
            ln -sf Koryphaios.png "$APPDIR/koryphaios-desktop.png"
            ln -sf Koryphaios.png "$APPDIR/.DirIcon"
          fi

          # Repack with appimagetool (does NOT re-run patchelf)
          APPIMAGETOOL="$HOME/.cache/tauri/appimagetool-x86_64.AppImage"
          if [ ! -x "$APPIMAGETOOL" ]; then
            echo "appimagetool not found at $APPIMAGETOOL"
            exit 1
          fi

          OUTPUT="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Koryphaios_${GITHUB_REF_NAME:-local}_amd64.AppImage"
          # Use version from tauri.conf if no tag
          if [ -z "$GITHUB_REF_NAME" ] || ! echo "$GITHUB_REF_NAME" | grep -q '^v'; then
            VERSION=$(grep -o '"version": *"[^"]*"' desktop/src-tauri/tauri.conf.json | head -1 | grep -o '[0-9][0-9.]*')
            OUTPUT="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Koryphaios_${VERSION}_amd64.AppImage"
          fi

          rm -f "$OUTPUT" "$APPIMAGE"
          ARCH=x86_64 "$APPIMAGETOOL" --appimage-extract-and-run -n "$APPDIR" "$OUTPUT"
          echo "Repacked AppImage: $OUTPUT"
          ls -la "$OUTPUT"

      - name: Verify Linux build produced expected artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          # After the repair step, verify the deb/rpm exist (these are built
          # before linuxdeploy runs and don't need repair) and the AppImage
          # was repacked.
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          DEB_COUNT=$(find "$BUNDLE_DIR/deb" -name "*.deb" 2>/dev/null | wc -l)
          RPM_COUNT=$(find "$BUNDLE_DIR/rpm" -name "*.rpm" 2>/dev/null | wc -l)
          APPIMAGE_COUNT=$(find "$BUNDLE_DIR/appimage" -name "*.AppImage" 2>/dev/null | wc -l)
          echo "Artifacts: deb=$DEB_COUNT rpm=$RPM_COUNT appimage=$APPIMAGE_COUNT"
          if [ "$APPIMAGE_COUNT" -eq 0 ]; then
            echo "ERROR: No AppImage produced — repair step failed"
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create universal macOS build (combines Intel and ARM)
  build-macos-universal:
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 60
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build universal bundled backend sidecar
        shell: bash
        run: |
          SIDECAR_DIR="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar"
          mkdir -p "$SIDECAR_DIR"
          bun build --compile --target=bun-darwin-arm64 backend/src/server.ts --outfile="$SIDECAR_DIR/koryphaios-backend-arm64"
          bun build --compile --target=bun-darwin-x64 backend/src/server.ts --outfile="$SIDECAR_DIR/koryphaios-backend-x64"
          lipo -create "$SIDECAR_DIR/koryphaios-backend-arm64" "$SIDECAR_DIR/koryphaios-backend-x64" -output "$SIDECAR_DIR/koryphaios-backend-universal-apple-darwin"
          cp "$SIDECAR_DIR/koryphaios-backend-universal-apple-darwin" "$SIDECAR_DIR/koryphaios-backend"

      - name: Build Universal Binary
        working-directory: ./desktop
        run: bun run tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Universal macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal-artifacts
          path: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Summary job
  build-summary:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [build-windows, build-macos, build-linux]
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "Build Status Summary:"
          echo "===================="
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "macOS: ${{ needs.build-macos.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"

          if [ "${{ needs.build-windows.result }}" = "success" ] && \
             [ "${{ needs.build-macos.result }}" = "success" ] && \
             [ "${{ needs.build-linux.result }}" = "success" ]; then
            echo "All builds succeeded!"
            exit 0
          else
            echo "Some builds failed!"
            exit 1
          fi
        shell: bash
