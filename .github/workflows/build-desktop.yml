name: Build Desktop Apps

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'desktop/**'
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  # Build for Windows
  build-windows:
    runs-on: blacksmith-2vcpu-windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          TARGET="x86_64-pc-windows-msvc"
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${TARGET}.exe"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=bun-windows-x64 backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend.exe"

      - name: Build Tauri app
        working-directory: ./desktop
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build for macOS (Intel and Apple Silicon)
  build-macos:
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
            bun-target: bun-darwin-x64
          - arch: aarch64
            target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.target }}"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=${{ matrix.bun-target }} backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend"

      - name: Build Tauri app (Universal Binary)
        working-directory: ./desktop
        run: |
          bun run tauri build --target ${{ matrix.target }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build for Linux
  build-linux:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            bun-target: bun-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build bundled backend sidecar
        shell: bash
        run: |
          OUTFILE="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend-${{ matrix.target }}"
          mkdir -p "$(dirname "$OUTFILE")"
          bun build --compile --target=${{ matrix.bun-target }} backend/src/server.ts --outfile="$OUTFILE"
          cp "$OUTFILE" "$GITHUB_WORKSPACE/desktop/src-tauri/sidecar/koryphaios-backend"

      - name: Build Tauri app
        working-directory: ./desktop
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create universal macOS build (combines Intel and ARM)
  build-macos-universal:
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 60
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: aarch64-apple-darwin

      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build frontend
        working-directory: ./frontend
        run: bun run build
        env:
          BUILD_MODE: static
          NODE_ENV: production

      - name: Build universal bundled backend sidecar
        shell: bash
        run: |
          SIDECAR_DIR="$GITHUB_WORKSPACE/desktop/src-tauri/sidecar"
          mkdir -p "$SIDECAR_DIR"
          bun build --compile --target=bun-darwin-arm64 backend/src/server.ts --outfile="$SIDECAR_DIR/koryphaios-backend-arm64"
          bun build --compile --target=bun-darwin-x64 backend/src/server.ts --outfile="$SIDECAR_DIR/koryphaios-backend-x64"
          lipo -create "$SIDECAR_DIR/koryphaios-backend-arm64" "$SIDECAR_DIR/koryphaios-backend-x64" -output "$SIDECAR_DIR/koryphaios-backend-universal-apple-darwin"
          cp "$SIDECAR_DIR/koryphaios-backend-universal-apple-darwin" "$SIDECAR_DIR/koryphaios-backend"

      - name: Build Universal Binary
        working-directory: ./desktop
        run: bun run tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Universal macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal-artifacts
          path: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Summary job
  build-summary:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [build-windows, build-macos, build-linux]
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "Build Status Summary:"
          echo "===================="
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "macOS: ${{ needs.build-macos.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"

          if [ "${{ needs.build-windows.result }}" = "success" ] && \
             [ "${{ needs.build-macos.result }}" = "success" ] && \
             [ "${{ needs.build-linux.result }}" = "success" ]; then
            echo "All builds succeeded!"
            exit 0
          else
            echo "Some builds failed!"
            exit 1
          fi
        shell: bash
